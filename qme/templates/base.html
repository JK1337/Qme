<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ title }} — Qme{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='css/theme.css') }}">
</head>
<body>
  <header class="top-nav">
    <div class="nav-inner">
      <a href="/" class="logo">Qme</a>
      <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/jobs">Browse roles</a>
        <a href="/learn">Play to learn</a>
        <a href="/cv">My Resume</a>
        {% if current_user %}
        <a href="/account" class="nav-account">{{ current_user.display_name }}</a>
        {% else %}
        <a href="/account/login">Sign in</a>
        {% endif %}
      </nav>
    </div>
  </header>
  <main class="main">
    {% block content %}{% endblock %}
  </main>
  <footer class="footer">
    <p>Qme — find your dream job, then use credits from play-to-learn training to win it.</p>
  </footer>
</body>
</html>
