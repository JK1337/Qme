<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ title }} — Qme{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='css/theme.css') }}">
</head>
<body>
  <header class="top-nav">
    <div class="nav-inner">
      <a href="/" class="logo">Qme</a>
      <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/jobs">Browse roles</a>
        <a href="/learn">Play to learn</a>
        <a href="/cv">CV &amp; AI</a>
        <a href="/reqme">reQme</a>
        <span class="nav-credits" title="Spendable credits">Credits: <strong>{{ credit_balance }}</strong></span>
        {% if current_user %}
        <a href="/account" class="nav-account">{{ current_user.display_name }}</a>
        <form class="nav-logout" method="post" action="/account/logout">
          <button type="submit" class="link-button">Log out</button>
        </form>
        {% else %}
        <a href="/account/login">Sign in</a>
        <a href="/account/register">Create account</a>
        {% endif %}
      </nav>
    </div>
  </header>
  <main class="main">
    {% block content %}{% endblock %}
  </main>
  <footer class="footer">
    <p>Qme — find your dream job, then use credits from play-to-learn training to win it.</p>
  </footer>
</body>
</html>
