{% extends "base.html" %}
{% block content %}
<section class="page-header">
  <h1>Sign in</h1>
  <p>Access your main CV, life story, and tailored rewrites.</p>
</section>

{% if error %}
<p class="form-error" role="alert">{{ error }}</p>
{% endif %}

<form method="post" action="/account/login" class="card form-card account-form narrow">
  <input type="hidden" name="next" value="{{ next_path or '/account' }}">

  <label for="email">Email</label>
  <input id="email" name="email" type="email" required autocomplete="email">

  <label for="password">Password</label>
  <input id="password" name="password" type="password" required autocomplete="current-password">

  <button type="submit" class="btn btn-primary">Sign in</button>
  <p class="hint">New here? <a href="/account/register">Create an account</a></p>
</form>
{% endblock %}
